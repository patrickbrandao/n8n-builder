events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;
    access_log off;
    error_log /dev/stderr warn;

    # Mapeamento para Connection header (WebSocket)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend {
        server n8n_main1:5678;
        server n8n_main2:5678;
        
        # Mantém conexões persistentes com o backend
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            
            # Necessário para WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Headers de proxy reverso
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts (importantes para WebSocket)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Desabilita buffering para real-time
            proxy_buffering off;
        }
    }
}
